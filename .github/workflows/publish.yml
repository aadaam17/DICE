name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys
          import tomllib

          tag = pathlib.Path("${{ github.ref_name }}").name
          expected = tag.removeprefix("v")
          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          actual = pyproject["project"]["version"]
          if actual != expected:
              print(f"Tag {tag} does not match pyproject version {actual}", file=sys.stderr)
              sys.exit(1)
          if not re.fullmatch(r"\d+\.\d+\.\d+", actual):
              print(f"Version must look like 0.1.0, got {actual}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build

      - name: Build package
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish distributions to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/dice-chain-executor/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
